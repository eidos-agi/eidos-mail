<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eidos-mail — {{ user_email }}</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
<style>
  :root { --bg: #0a0a0a; --fg: #e0e0e0; --accent: #4fc3f7; --border: #333; --card: #141414; --muted: #888; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--fg); padding: 1rem; max-width: 960px; margin: 0 auto; }
  [x-cloak] { display: none !important; }
  h1 { color: var(--accent); font-size: 1.1rem; margin-bottom: 1rem; }
  h2 { color: var(--accent); font-size: 0.95rem; margin-bottom: 0.8rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .tab { padding: 0.5rem 1rem; cursor: pointer; border: 1px solid transparent; border-bottom: none; color: var(--muted); background: none; font-family: inherit; font-size: 0.85rem; }
  .tab:hover, .tab.active { color: var(--accent); border-color: var(--border); background: var(--card); }
  input, textarea, select { font-family: inherit; font-size: 0.85rem; background: var(--card); color: var(--fg); border: 1px solid var(--border); padding: 0.4rem 0.6rem; width: 100%; border-radius: 3px; }
  textarea { min-height: 120px; resize: vertical; }
  button, .btn { font-family: inherit; font-size: 0.85rem; background: var(--accent); color: #000; border: none; padding: 0.4rem 1rem; cursor: pointer; border-radius: 3px; font-weight: bold; }
  button:hover { opacity: 0.8; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .email-row { padding: 0.6rem; border-bottom: 1px solid var(--border); cursor: pointer; }
  .email-row:hover { background: var(--card); }
  .email-from { color: var(--accent); font-size: 0.8rem; }
  .email-subject { font-size: 0.85rem; margin: 0.2rem 0; }
  .email-date { color: var(--muted); font-size: 0.75rem; }
  .email-snippet { color: var(--muted); font-size: 0.75rem; max-height: 1.2em; overflow: hidden; }
  .email-detail { background: var(--card); border: 1px solid var(--border); padding: 1rem; margin-top: 0.5rem; border-radius: 3px; }
  .email-detail pre { white-space: pre-wrap; font-size: 0.8rem; margin-top: 0.5rem; color: var(--fg); }
  .email-detail .meta { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.5rem; }
  .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .search-bar input { flex: 1; }
  .form-group { margin-bottom: 0.6rem; }
  .form-group label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.2rem; }
  .flash { padding: 0.5rem; margin-bottom: 0.5rem; border-radius: 3px; font-size: 0.8rem; }
  .flash-ok { background: #1b3a1b; color: #4caf50; border: 1px solid #2e7d32; }
  .flash-err { background: #3a1b1b; color: #ef5350; border: 1px solid #c62828; }
  .stats { color: var(--muted); font-size: 0.75rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .loading-indicator { color: var(--accent); font-size: 0.8rem; }
  .sync-btn { background: none; color: var(--muted); border: 1px solid var(--border); padding: 0.3rem 0.6rem; font-size: 0.75rem; font-weight: normal; }
  .sync-btn:hover { color: var(--accent); border-color: var(--accent); }
  .pagination { display: flex; gap: 1rem; align-items: center; justify-content: center; padding: 0.8rem 0; color: var(--muted); font-size: 0.8rem; }
  .pagination a { color: var(--accent); text-decoration: none; }
  .pagination a:hover { text-decoration: underline; }
  /* Folder sub-nav */
  .folder-nav { display: flex; gap: 0; margin-bottom: 0.8rem; border-bottom: 1px solid var(--border); }
  .folder-tab { padding: 0.3rem 0.8rem; cursor: pointer; border: 1px solid transparent; border-bottom: none; color: var(--muted); background: none; font-family: inherit; font-size: 0.75rem; font-weight: normal; }
  .folder-tab:hover, .folder-tab.active { color: var(--accent); border-color: var(--border); background: var(--card); }
  .folder-count { font-size: 0.7rem; }
  /* Pulse animation for sync */
  .pulse { animation: pulse-anim 1.2s ease-in-out infinite; }
  @keyframes pulse-anim {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  /* Diagnostics styles */
  .diag-section { }
  .diag-title { color: var(--accent); font-size: 0.95rem; margin-bottom: 0.8rem; }
  .diag-card { background: var(--card); border: 1px solid var(--border); padding: 0.8rem; margin-bottom: 0.6rem; border-radius: 3px; }
  .diag-label { color: var(--accent); font-size: 0.75rem; margin-bottom: 0.3rem; font-weight: bold; }
  .diag-value { font-size: 0.8rem; color: var(--fg); }
  .diag-folder-row { padding: 0.15rem 0; }
  /* Ike (Eisenhower Matrix) */
  .ike-toggle { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; font-size: 0.8rem; color: var(--muted); }
  .ike-toggle input[type="checkbox"] { width: auto; accent-color: var(--accent); }
  .ike-matrix { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 2px; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .ike-quadrant { background: var(--card); padding: 0.8rem; min-height: 120px; cursor: pointer; position: relative; transition: background 0.15s; }
  .ike-quadrant:hover { background: #1a1a1a; }
  .ike-quadrant.selected { border: 2px solid var(--accent); }
  .ike-q-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.4rem; }
  .ike-q-count { font-size: 1.4rem; font-weight: bold; margin-bottom: 0.2rem; }
  .ike-dot { width: 6px; height: 6px; border-radius: 50%; position: absolute; }
  .ike-axes { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--muted); padding: 0.2rem 0; }
  .ike-axis-label { font-size: 0.7rem; color: var(--muted); text-align: center; margin-top: 0.3rem; }
  /* Unread email styling */
  .email-row.unread { background: #0d1117; }
  .email-row.unread .email-from { font-weight: bold; }
  .email-row.unread .email-subject { font-weight: bold; color: var(--fg); }
  .unread-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 0.4rem; vertical-align: middle; }
</style>
</head>
<body x-data="{ tab: '{{ active_tab }}', loading: false }" x-cloak>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
  <h1 style="margin-bottom:0;">▸ eidos-mail — {{ user_email }}</h1>
  <div>
    <span style="color:var(--muted);font-size:0.75rem;">{{ user_email }}</span>
    <a href="/auth/logout" style="color:var(--muted);font-size:0.75rem;text-decoration:none;border:1px solid var(--border);padding:0.3rem 0.6rem;border-radius:3px;margin-left:0.5rem;">logout</a>
  </div>
</div>
<div class="tabs">
  <button class="tab" :class="{ active: tab === 'inbox' }"
    @click="tab = 'inbox'; htmx.ajax('GET', '/inbox', {target: '#content', swap: 'innerHTML'})">inbox</button>
  <button class="tab" :class="{ active: tab === 'search' }"
    @click="tab = 'search'; htmx.ajax('GET', '/search', {target: '#content', swap: 'innerHTML'})">search</button>
  <button class="tab" :class="{ active: tab === 'compose' }"
    @click="tab = 'compose'; htmx.ajax('GET', '/compose', {target: '#content', swap: 'innerHTML'})">compose</button>
  <button class="tab" :class="{ active: tab === 'imap' }"
    @click="tab = 'imap'; htmx.ajax('GET', '/imap', {target: '#content', swap: 'innerHTML'})">imap</button>
  <button class="tab" :class="{ active: tab === 'infra' }"
    @click="tab = 'infra'; htmx.ajax('GET', '/infra', {target: '#content', swap: 'innerHTML'})">infra</button>
</div>
<span class="loading-indicator" x-show="loading" x-transition>loading...</span>
<div id="content">
  {{ content | safe }}
</div>
<script>
document.body.addEventListener('htmx:beforeRequest', () => {
  Alpine.evaluate(document.body, 'loading = true');
});
document.body.addEventListener('htmx:afterSwap', () => {
  Alpine.evaluate(document.body, 'loading = false');
});
document.body.addEventListener('htmx:beforeSwap', function(evt) {
  if (evt.detail.xhr.responseURL && evt.detail.xhr.responseURL.includes('/auth/login')) {
    window.location.href = '/auth/login';
    evt.detail.shouldSwap = false;
  }
});
</script>
</body>
</html>
