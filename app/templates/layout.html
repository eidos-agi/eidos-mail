<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>&#9993;</text></svg>">
<title>Eidos Mail</title>
<link rel="stylesheet" href="/static/app.css">
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body x-data="{ tab: '{{ active_tab }}' }" x-cloak>
<div class="app-shell">

  <!-- Header -->
  <header class="app-header">
    <h1><span class="logo">&#9993;</span> Eidos Mail</h1>
    <div class="header-actions">
      <span style="font-size:0.75rem;color:var(--muted);">{{ user_email }}</span>
      <a href="/auth/logout" class="btn-ghost" style="font-size:0.75rem;">Logout</a>
    </div>
  </header>

  <!-- Desktop tabs -->
  <nav class="desktop-tabs">
    <button class="desk-tab" :class="{ active: tab === 'inbox' }"
      @click="tab = 'inbox'; htmx.ajax('GET', '/inbox', {target: '#content', swap: 'innerHTML'})">Inbox</button>
    <button class="desk-tab" :class="{ active: tab === 'search' }"
      @click="tab = 'search'; htmx.ajax('GET', '/search', {target: '#content', swap: 'innerHTML'})">Search</button>
    <button class="desk-tab" :class="{ active: tab === 'compose' }"
      @click="tab = 'compose'; htmx.ajax('GET', '/compose', {target: '#content', swap: 'innerHTML'})">Compose</button>
    <button class="desk-tab" :class="{ active: tab === 'imap' }"
      @click="tab = 'imap'; htmx.ajax('GET', '/imap', {target: '#content', swap: 'innerHTML'})">IMAP</button>
    <button class="desk-tab" :class="{ active: tab === 'infra' }"
      @click="tab = 'infra'; htmx.ajax('GET', '/infra', {target: '#content', swap: 'innerHTML'})">Infra</button>
  </nav>

  <!-- Content -->
  <main class="app-content">
    <div id="content">{{ content | safe }}</div>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn" :class="{ active: tab === 'inbox' }"
      @click="tab = 'inbox'; htmx.ajax('GET', '/inbox', {target: '#content', swap: 'innerHTML'})">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="3 9 12 15 21 9"/></svg>
      </span>
      Inbox
    </button>
    <button class="nav-btn" :class="{ active: tab === 'search' }"
      @click="tab = 'search'; htmx.ajax('GET', '/search', {target: '#content', swap: 'innerHTML'})">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      Search
    </button>
    <button class="nav-btn" :class="{ active: tab === 'compose' }"
      @click="tab = 'compose'; htmx.ajax('GET', '/compose', {target: '#content', swap: 'innerHTML'})">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </span>
      Compose
    </button>
    <button class="nav-btn" :class="{ active: tab === 'infra' }"
      @click="tab = 'infra'; htmx.ajax('GET', '/infra', {target: '#content', swap: 'innerHTML'})">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </span>
      Settings
    </button>
  </nav>
</div>

<script src="/static/app.js"></script>
<script>
document.body.addEventListener('htmx:beforeSwap', function(evt) {
  if (evt.detail.xhr.responseURL && evt.detail.xhr.responseURL.includes('/auth/login')) {
    window.location.href = '/auth/login';
    evt.detail.shouldSwap = false;
  }
});
</script>
</body>
</html>
