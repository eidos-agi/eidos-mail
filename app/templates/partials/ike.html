<div class="ike-grid">
  <div class="ike-card{% if ike_quadrant == 'do' %} selected{% endif %}"
    hx-get="/inbox?folder={{ active_folder }}&ike=do" hx-target="#content" hx-swap="innerHTML">
    <div class="q-label" style="color:var(--red);">DO FIRST</div>
    <div class="q-count" style="color:var(--red);">{{ counts.do }}</div>
    <div class="q-desc">urgent + important</div>
  </div>
  <div class="ike-card{% if ike_quadrant == 'schedule' %} selected{% endif %}"
    hx-get="/inbox?folder={{ active_folder }}&ike=schedule" hx-target="#content" hx-swap="innerHTML">
    <div class="q-label" style="color:var(--green);">SCHEDULE</div>
    <div class="q-count" style="color:var(--green);">{{ counts.schedule }}</div>
    <div class="q-desc">not urgent + important</div>
  </div>
  <div class="ike-card{% if ike_quadrant == 'delegate' %} selected{% endif %}"
    hx-get="/inbox?folder={{ active_folder }}&ike=delegate" hx-target="#content" hx-swap="innerHTML">
    <div class="q-label" style="color:var(--orange);">DELEGATE</div>
    <div class="q-count" style="color:var(--orange);">{{ counts.delegate }}</div>
    <div class="q-desc">urgent + not important</div>
  </div>
  <div class="ike-card{% if ike_quadrant == 'eliminate' %} selected{% endif %}"
    hx-get="/inbox?folder={{ active_folder }}&ike=eliminate" hx-target="#content" hx-swap="innerHTML">
    <div class="q-label" style="color:var(--muted);">ELIMINATE</div>
    <div class="q-count" style="color:var(--muted);">{{ counts.eliminate }}</div>
    <div class="q-desc">not urgent + not important</div>
  </div>
</div>
