<div class="email-row{% if not e.is_read %} unread{% endif %}" hx-get="/email/{{ e.id }}" hx-target="#detail-{{ e.id }}" hx-swap="innerHTML">
  <div class="email-from">{% if not e.is_read %}<span class="unread-dot"></span>{% endif %}{{ e.from_addr }}</div>
  <div class="email-subject">{{ e.subject }}</div>
  <div style="display:flex;justify-content:space-between;">
    <span class="email-snippet">{{ e.snippet }}</span>
    <span class="email-date">{{ e.date_sent }}</span>
  </div>
  <div id="detail-{{ e.id }}"></div>
</div>
