<div class="folder-tabs" x-data="{ folder: '{{ active_folder }}' }">
  {% for f in folders %}
  <button class="folder-tab"
    :class="{ active: folder === '{{ f.name }}' }"
    @click="folder = '{{ f.name }}'"
    hx-get="/inbox?folder={{ f.name }}" hx-target="#content" hx-swap="innerHTML">
    {{ f.label }} <span style="font-size:0.7rem;color:var(--muted);">({{ f.count }})</span>
  </button>
  {% endfor %}
</div>
