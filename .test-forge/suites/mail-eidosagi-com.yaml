name: mail-eidosagi-com
target: https://mail.eidosagi.com
target_type: api
created_at: '2026-03-08T12:24:41Z'
steps:
# --- Health & Public ---
- name: health endpoint
  type: health
  config:
    url: https://mail.eidosagi.com/health
  why: service is alive and reports email count
- name: openapi.json is publicly accessible
  type: http
  config:
    url: https://mail.eidosagi.com/openapi.json
    method: GET
    expect_status: 200
    expect_body_contains: eidos-mail
  why: OpenAPI spec should be public for documentation
- name: unknown path returns 404
  type: http
  config:
    url: https://mail.eidosagi.com/__nonexistent_path_xyz__
    method: GET
    expect_status: 404
  why: proper 404 handling, not catch-all redirect

# --- Auth flow ---
- name: auth login initiates OAuth redirect
  type: http
  config:
    url: https://mail.eidosagi.com/auth/login
    method: GET
    expect_status: 302
  why: login should redirect to OAuth provider
- name: auth callback without code handles gracefully
  type: http
  config:
    url: https://mail.eidosagi.com/auth/callback
    method: GET
    expect_status: 302
  why: callback with no code/state should redirect, not crash
- name: auth logout redirects
  type: http
  config:
    url: https://mail.eidosagi.com/auth/logout
    method: GET
    expect_status: 302
  why: logout should redirect

# --- Web UI routes (302 redirect to login) ---
- name: root redirects unauthenticated to login
  type: http
  config:
    url: https://mail.eidosagi.com/
    method: GET
    expect_status: 302
  why: auth guard on root
- name: inbox requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/inbox
    method: GET
    expect_status: 302
  why: protected page redirects to login
- name: email detail requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/email/99999
    method: GET
    expect_status: 302
  why: auth fires before path param validation
- name: search requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/search
    method: GET
    expect_status: 302
  why: protected page redirects to login
- name: search results requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/search/results
    method: GET
    expect_status: 302
  why: protected page redirects to login
- name: compose requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/compose
    method: GET
    expect_status: 302
  why: protected page redirects to login
- name: imap requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/imap
    method: GET
    expect_status: 302
  why: protected page redirects to login
- name: infra dashboard requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/infra
    method: GET
    expect_status: 302
  why: diagnostics pages must not be public

# --- Web UI POST routes (302 redirect to login) ---
- name: POST /sync requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/sync
    method: POST
    expect_status: 302
  why: POST is correct method per spec, still requires auth
- name: POST /send requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/send
    method: POST
    expect_status: 302
  why: send email must be auth-protected
- name: POST /mark-all-read requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/mark-all-read
    method: POST
    expect_status: 302
  why: destructive action must require auth
- name: POST /draft requires auth
  type: http
  config:
    url: https://mail.eidosagi.com/draft
    method: POST
    expect_status: 302
  why: write operation requires auth

# --- Method enforcement ---
- name: GET on POST-only /sync returns 405
  type: http
  config:
    url: https://mail.eidosagi.com/sync
    method: GET
    expect_status: 405
  why: spec shows /sync is POST-only

# --- API routes (404 to hide existence — secure by design) ---
- name: API base path returns 404
  type: http
  config:
    url: https://mail.eidosagi.com/api
    method: GET
    expect_status: 404
  why: unauthenticated requests get 404, hides endpoint existence
- name: API emails returns 404 without auth
  type: http
  config:
    url: https://mail.eidosagi.com/api/emails?recent=10
    method: GET
    expect_status: 404
  why: API returns 404 to hide endpoint existence
- name: API search returns 404 without auth
  type: http
  config:
    url: https://mail.eidosagi.com/api/search?q=test
    method: GET
    expect_status: 404
  why: API returns 404 to hide endpoint existence
- name: API search without q returns 404
  type: http
  config:
    url: https://mail.eidosagi.com/api/search
    method: GET
    expect_status: 404
  why: auth fires first (404), missing q param never reached
- name: POST /api/sync returns 404 without auth
  type: http
  config:
    url: https://mail.eidosagi.com/api/sync
    method: POST
    expect_status: 404
  why: API write endpoint hidden without auth
- name: POST /api/send returns 404 without auth
  type: http
  config:
    url: https://mail.eidosagi.com/api/send
    method: POST
    expect_status: 404
  why: critical endpoint hidden without auth
- name: API email detail returns 404 without auth
  type: http
  config:
    url: https://mail.eidosagi.com/api/emails/99999
    method: GET
    expect_status: 404
  why: auth returns 404 before checking if email exists
