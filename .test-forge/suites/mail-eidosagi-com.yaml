- name: email detail with SQL injection attempt in ID
  type: http
  config:
    url: https://mail.eidosagi.com/email/1%20OR%201=1
    method: GET
    expect_status: 302
  why: "SQLi in email_id \u2014 should be rejected or redirect to auth, not process\
    \ the injection"
- name: API emails unauthed returns 401 or 403 (not 404)
  type: http
  config:
    url: https://mail.eidosagi.com/api/emails?recent=5
    method: GET
  why: "API endpoints should return proper auth error codes. 404 hides auth state\
    \ but also hides bugs \u2014 need to see what actually happens"
- name: search with XSS payload in query param
  type: http
  config:
    url: https://mail.eidosagi.com/search/results?q=%3Cscript%3Ealert(1)%3C/script%3E
    method: GET
    expect_status: 302
  why: "XSS in search query \u2014 should redirect to auth, but if somehow rendered,\
    \ must be escaped"
- name: CORS headers on API endpoint
  type: http
  config:
    url: https://mail.eidosagi.com/api/emails
    method: GET
    headers:
      Origin: https://evil.com
  why: "Check if API reflects arbitrary origins in Access-Control-Allow-Origin \u2014\
    \ would allow cross-site data theft"
- name: auth callback with crafted code param
  type: http
  config:
    url: https://mail.eidosagi.com/auth/callback?code=malicious_code_value&state=fake
    method: GET
    expect_status: 302
  why: Does the callback validate the OAuth state parameter? A fake code+state should
    fail gracefully (302 to login), not 500.
- name: CORS headers on health endpoint (reachable)
  type: http
  config:
    url: https://mail.eidosagi.com/health
    method: OPTIONS
    headers:
      Origin: https://evil.com
      Access-Control-Request-Method: GET
    expect_status: 200
  why: Round 1 CORS test hit a 404. Testing against /health which is reachable to
    see if CORS is configured and whether it reflects arbitrary origins.
- name: API endpoints hide behind 404 vs auth bypass with forged cookie
  type: http
  config:
    url: https://mail.eidosagi.com/api/emails?recent=5
    method: GET
    headers:
      Cookie: session=eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyIjoiYWRtaW4ifQ.fake
    expect_status: 404
  why: "API returns 404 unauthed (good \u2014 hides existence). But does a forged\
    \ session cookie change behavior? If it returns 401/403 instead of 404, that leaks\
    \ endpoint existence to anyone with a bad token."
- name: static assets accessible without auth (PWA)
  type: http
  config:
    url: https://mail.eidosagi.com/static/manifest.json
    method: GET
    expect_status: 200
  why: PWA was just deployed. manifest.json and service worker should be publicly
    accessible for PWA install to work. Verifies static file serving.
- name: service worker JS accessible without auth
  type: http
  config:
    url: https://mail.eidosagi.com/static/sw.js
    method: GET
    expect_status: 200
  why: Service worker must be public for PWA. Also check if it contains any hardcoded
    secrets or API keys in the JS.
- name: path traversal via double encoding on email detail
  type: http
  config:
    url: https://mail.eidosagi.com/email/%2e%2e%2f%2e%2e%2fadmin
    method: GET
    expect_status: 404
  why: Round 1 path traversal got 404 (route didn't match). Testing URL-encoded traversal
    to see if the framework normalizes before or after routing.
- name: "HTTP method confusion \u2014 PUT on /api/emails/1/delete"
  type: http
  config:
    url: https://mail.eidosagi.com/api/emails/1/delete
    method: PUT
    headers:
      Content-Type: application/json
    body: '{}'
    expect_status: 405
  why: Delete endpoint expects POST. Does it properly reject PUT with 405, or does
    it leak info / accept unexpected methods?
- name: manifest.json accessible without auth (PWA)
  type: http
  config:
    url: https://mail.eidosagi.com/manifest.json
    method: GET
    expect_status: 200
    expect_body_contains: name
  why: Previous static asset probe used wrong path. PWA manifest.json is standard
    and should be public.
- name: static directory enumeration (common FastAPI pattern)
  type: http
  config:
    url: https://mail.eidosagi.com/static/style.css
    method: GET
    expect_status: 200
  why: FastAPI typically serves static from /static/. Previous probe may have used
    wrong path. Try common filenames.
- name: CORS preflight on /health (OPTIONS method)
  type: http
  config:
    url: https://mail.eidosagi.com/health
    method: OPTIONS
    headers:
      Origin: https://evil.com
      Access-Control-Request-Method: GET
    expect_status: 200
  why: "Previous CORS check on /health got 405 \u2014 likely sent wrong method. OPTIONS\
    \ preflight is the correct way to test CORS."
- name: auth callback 500 response body inspection
  type: http
  config:
    url: https://mail.eidosagi.com/auth/callback?code=AAAA&state=fakesession
    method: GET
    expect_status: 500
    expect_body_contains: traceback
  why: "Callback returns 500 \u2014 need to verify response body doesn't leak stack\
    \ traces, internal paths, or secrets with a crafted state param."
- name: 'IDOR: email detail with ID=1 (lowest valid) unauthed'
  type: http
  config:
    url: https://mail.eidosagi.com/email/1
    method: GET
    expect_status: 302
  why: "Previous path traversal test got 404 \u2014 but a normal numeric ID should\
    \ redirect to login. Verifying auth gate works on valid-looking IDs."
- name: 'sensitive path probe: /docs (FastAPI auto-docs)'
  type: http
  config:
    url: https://mail.eidosagi.com/docs
    method: GET
    expect_status: 404
  why: FastAPI exposes /docs (Swagger UI) by default. Should be disabled in production.
    If 200, it's an info leak.
- name: 'sensitive path probe: /redoc'
  type: http
  config:
    url: https://mail.eidosagi.com/redoc
    method: GET
    expect_status: 404
  why: FastAPI also exposes /redoc by default. Should be disabled alongside /docs.
- name: search with oversized query param (input validation)
  type: http
  config:
    url: https://mail.eidosagi.com/search/results?
    method: GET
    expect_status: 302
  why: Auth should reject before query processing. If 500, the app crashes on large
    input instead of bouncing to login.
- name: FastAPI /docs disabled in production (security fix verified)
  type: http
  config:
    url: https://mail.eidosagi.com/docs
    method: GET
    expect_status: 404
  why: "Swagger UI was exposed in production — now disabled via docs_url=None. Verify it stays off."
- name: 'sensitive path probe: /docs/oauth2-redirect'
